<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyclea</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --blob-1: #3b82f6;
            --blob-2: #60a5fa;
            --bg-base: #eff6ff;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-color: var(--bg-base);
            transition: background-color 1.2s ease;
        }

        /* Fluid Background Logic */
        .fluid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            filter: blur(80px);
            opacity: 0.6;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            transition: background-color 1.2s ease;
            animation: move 25s infinite alternate ease-in-out;
        }

        .blob-1 { width: 500px; height: 500px; background: var(--blob-1); top: -10%; left: -10%; }
        .blob-2 { width: 600px; height: 600px; background: var(--blob-2); bottom: -10%; right: -10%; animation-delay: -5s; }
        .blob-3 { width: 400px; height: 400px; background: white; top: 40%; left: 30%; animation-duration: 30s; }

        @keyframes move {
            from { transform: translate(0, 0) rotate(0deg) scale(1); }
            to { transform: translate(100px, 100px) rotate(360deg) scale(1.2); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .card-shadow { box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07); }

        .phase-transition { transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Suggestions Fading Animation */
        .fade-transition {
            transition: opacity 0.5s ease-in-out;
        }
        .fade-out { opacity: 0; }
        .fade-in { opacity: 1; }

        /* Icon Styles */
        .icon-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        @media print {
            .no-print { display: none !important; }
            #table-overlay { display: block !important; position: static !important; background: white !important; }
            .fluid-bg { display: none; }
        }
    </style>
</head>

            const length = document.getElementById('input-length').value;
            if (!date) return;
            STATE.startDate = date;
            STATE.cycleLength = parseInt(length);
            localStorage.setItem('cycle_start', date);
            localStorage.setItem('cycle_length', length);
            document.getElementById('setup-view').classList.add('hidden');
            updateUI();
        }

        function calculateCycleDay() {
            if (!STATE.startDate) return null;
            const start = new Date(STATE.startDate);
            const today = new Date();
            today.setHours(0,0,0,0);
            start.setHours(0,0,0,0);
            const diffDays = Math.floor((today - start) / (1000 * 60 * 60 * 24));
            return (diffDays % STATE.cycleLength) + 1;
        }

        function getPhase(day) {
            if (day >= 1 && day <= 5) return PHASES.MENSTRUAL;
            if (day >= 6 && day <= 12) return PHASES.FOLLICULAR;
            if (day >= 13 && day <= 15) return PHASES.OVULATORY;
            if (day >= 16 && day <= 22) return PHASES.EARLY_LUTEAL;
            return PHASES.LATE_LUTEAL;
        }

        function updateUI() {
            const day = calculateCycleDay();
            if (day === null) return showSetup();
            const phase = getPhase(day);

            // Dynamic Background
            document.documentElement.style.setProperty('--blob-1', phase.theme.blob1);
            document.documentElement.style.setProperty('--blob-2', phase.theme.blob2);
            document.documentElement.style.setProperty('--bg-base', phase.theme.bg);

            // Phase Meta
            document.getElementById('phase-title').innerText = phase.name;
            document.getElementById('cycle-day-label').innerText = `Cycle Day ${day} of ${STATE.cycleLength}`;
            const pIcon = document.getElementById('phase-icon');
            pIcon.innerHTML = phase.icon;
            pIcon.style.backgroundColor = phase.theme.blob1;

            // Insights
            document.getElementById('mood-desc').innerText = phase.mood;
            document.getElementById('energy-label').innerText = phase.energy.split('.')[0];
            document.getElementById('energy-icon').innerHTML = phase.e_icon;
            document.getElementById('symptom-label').innerText = phase.symptom;
            document.getElementById('symptom-icon').innerHTML = phase.s_icon;

            // Nutrition & Activity
            document.getElementById('food-have').innerText = phase.food_have;
            document.getElementById('food-avoid').innerText = phase.food_avoid;
            document.getElementById('activity-label').innerText = phase.activity;
            document.getElementById('activity-icon-container').innerHTML = phase.a_icon;

            initSuggestions(phase.suggestions);
            renderMasterTable();
        }

        // Suggestions Logic
        function initSuggestions(list) {
            if (suggestionInterval) clearInterval(suggestionInterval);
            currentSuggestionIndex = 0;
            
            if (!list || list.length === 0) {
                document.getElementById('suggestions-card').classList.add('hidden');
                return;
            }
            document.getElementById('suggestions-card').classList.remove('hidden');
            
            // Build Dots
            const dotsContainer = document.getElementById('suggestion-dots');
            dotsContainer.innerHTML = list.map((_, i) => `
                <div class="suggestion-dot w-1.5 h-1.5 rounded-full bg-slate-300 transition-all ${i === 0 ? 'bg-indigo-500 w-4' : ''}" data-index="${i}"></div>
            `).join('');

            displaySuggestion(list[0]);

            if (list.length > 1) {
                suggestionInterval = setInterval(() => {
                    cycleSuggestion(list);
                }, 10000);
            }
        }

        function displaySuggestion(text) {
            const container = document.getElementById('suggestion-container');
            const el = document.getElementById('suggestion-text');
            
            container.classList.remove('fade-in');
            container.classList.add('fade-out');
            
            setTimeout(() => {
                el.innerText = text;
                container.classList.remove('fade-out');
                container.classList.add('fade-in');
            }, 500);
        }

        function cycleSuggestion(list) {
            currentSuggestionIndex = (currentSuggestionIndex + 1) % list.length;
            updateDots(currentSuggestionIndex);
            displaySuggestion(list[currentSuggestionIndex]);
        }

        function updateDots(index) {
            const dots = document.querySelectorAll('.suggestion-dot');
            dots.forEach((dot, i) => {
                if (i === index) {
                    dot.classList.add('bg-indigo-500', 'w-4');
                    dot.classList.remove('bg-slate-300');
                } else {
                    dot.classList.remove('bg-indigo-500', 'w-4');
                    dot.classList.add('bg-slate-300');
                }
            });
        }

        function manualCycleSuggestion() {
            const phase = getPhase(calculateCycleDay());
            if (phase.suggestions.length <= 1) return;
            
            // Reset interval so it doesn't double cycle
            if (suggestionInterval) {
                clearInterval(suggestionInterval);
                suggestionInterval = setInterval(() => cycleSuggestion(phase.suggestions), 10000);
            }
            
            cycleSuggestion(phase.suggestions);
        }

        function toggleTable() { document.getElementById('table-overlay').classList.toggle('hidden'); }

        function renderMasterTable() {
            const grid = document.getElementById('grid-render');
            const headers = ['Phase', 'Body', 'Hormones', 'Energy', 'Weather', 'Signs', 'Activity', 'Nutrition'];
            grid.innerHTML = headers.map(h => `<div class="p-6 bg-slate-50 font-black text-[10px] uppercase tracking-widest text-slate-400">${h}</div>`).join('');

            Object.values(PHASES).forEach(p => {
                const isCurrent = getPhase(calculateCycleDay()).name === p.name;
                const rowStyle = isCurrent ? 'bg-white ring-4 ring-inset ring-slate-900/5 z-10' : 'bg-white';
                
                grid.innerHTML += `
                    <div class="p-6 ${rowStyle} border-r border-slate-50 flex flex-col justify-center">
                        <span class="block font-black text-slate-900 text-lg leading-tight">${p.name}</span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Days ${p.days[0]}–${p.days[1]}</span>
                        ${isCurrent ? '<span class="mt-2 inline-block px-3 py-1 bg-blue-600 text-white text-[9px] font-black rounded-full uppercase w-fit shadow-sm">Now</span>' : ''}
                    </div>
                    <div class="p-4 ${rowStyle} border-r border-slate-50 text-xs font-medium text-slate-600">${p.body}</div>
                    <div class="p-6 ${rowStyle} border-r border-slate-50 text-xs font-medium text-slate-600">${p.hormones}</div>
                    <div class="p-6 ${rowStyle} border-r border-slate-50 text-xs font-medium text-slate-600">${p.energy}</div>
                    <div class="p-6 ${rowStyle} border-r border-slate-50 text-xs font-medium text-slate-600">${p.mood}</div>
                    <div class="p-6 ${rowStyle} border-r border-slate-50 text-xs font-medium text-slate-600">${p.symptom}</div>
                    <div class="p-6 ${rowStyle} border-r border-slate-50 text-xs font-medium text-slate-600">${p.activity}</div>
                    <div class="p-6 ${rowStyle} text-xs leading-relaxed text-slate-600">
                        <strong class="text-emerald-600 uppercase text-[9px] block mb-1">Have:</strong> ${p.food_have}<br>
                        <strong class="text-rose-500 uppercase text-[9px] block mt-2 mb-1">Avoid:</strong> ${p.food_avoid}
                    </div>
                `;
            });
        }

        async function saveTableImage() {
            const btn = document.getElementById('table-image-btn');
            const area = document.getElementById('capture-area');
            const originalText = btn.innerText;
            btn.innerText = "Capturing...";
            try {
                const canvas = await html2canvas(area, { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
                const link = document.createElement('a');
                link.download = `cycle-blueprint-${new Date().toISOString().split('T')[0]}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            } finally { btn.innerText = originalText; }
        }

        // Init
        if (!STATE.startDate) showSetup(); else updateUI();
    </script>
</body>
</html>
